<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header>
  <img src="assets/images/logo.png" alt="Crimson Crown Logo" class="logo">
  <nav class="navbar">
    <div class="menu-toggle">&#9776;</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>

  </nav>
</header>

<section class="page-header">
  <h1>Contact Us</h1>
  <p>Have questions or want to collaborate? Reach out to Crimson Crown Esports.</p>
</section>

<section class="content">
  <form class="form-box">
    <label for="name">Your Name</label>
    <input type="text" id="name" placeholder="Enter your name" required>

    <label for="email">Your Email</label>
    <input type="email" id="email" placeholder="Enter your email" required>

    <label for="subject">Subject</label>
    <input type="text" id="subject" placeholder="Message subject" required>

    <label for="message">Message</label>
    <textarea id="message" placeholder="Write your message" required></textarea>

    <button type="submit">Send Message</button>
  </form>
</section>

<footer>
  <p>© 2025 Crimson Crown Esports. All rights reserved.</p>
</footer>

<script src="assets/js/main.js"></script>
</body>
</html>
