<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Crimson Crown</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 🔴 Navigation (same as other pages) -->
  <header>
    <nav class="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
        <li><a href="tournaments.html">Tournaments</a></li>
        <li><a href="registration.html">Registration</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- 🔴 Hero -->
  <section class="page-header">
    <h1>Contact Us</h1>
    <p>Have questions or want to collaborate? Reach out to Crimson Crown Esports.</p>
  </section>

  <!-- 🔴 Contact Form -->
  <section class="content">
    <form class="form-box">
      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="Enter your name" required>

      <label for="email">Your Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>

      <label for="subject">Subject</label>
      <input type="text" id="subject" placeholder="Message subject" required>

      <label for="message">Message</label>
      <textarea id="message" placeholder="Write your message" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </section>

  <!-- 🔴 Footer -->
  <footer>
    <p>© 2025 Crimson Crown Esports. All rights reserved.</p>
  </footer>
</body>
</html>
