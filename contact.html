<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Crimson Crown</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/main.js" defer></script>
</head>
<body>
  <div id="header"></div>

  <section class="page-header">
    <h1>Contact Us</h1>
    <p>We’d love to hear from you</p>
  </section>

  <section class="content">
    <h2>Official Emails</h2>
    <ul>
      <li><strong>Admin:</strong> <a href="mailto:admin@crimsoncrown.top">admin@crimsoncrown.top</a></li>
      <li><strong>Support:</strong> <a href="mailto:support@crimsoncrown.top">support@crimsoncrown.top</a></li>
    </ul>

    <h2>Quick Contact Form</h2>
    <form action="https://formspree.io/f/your-form-id" method="POST" class="contact-form">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" required></textarea>
      <button type="submit" class="btn">Send Message</button>
    </form>
  </section>

  <div id="footer"></div>
</body>
</html>
