<script>
// Fetch JSON rows and render into table
fetch('php/leaderboard.php')
.then(r => r.json())
.then(rows => {
const tbody = document.getElementById('leaderboard-body');
tbody.innerHTML = rows.map((r, i) => `
<tr>
<td>${i + 1}</td>
<td>${r.team}</td>
<td>${r.r1}</td>
<td>${r.r2}</td>
<td>${r.r3}</td>
<td><strong>${r.total}</strong></td>
</tr>
`).join('');
})
.catch(() => {
const tbody = document.getElementById('leaderboard-body');
tbody.innerHTML = `<tr><td colspan="6">Unable to load leaderboard.</td></tr>`;
});
</script>
