<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — Crimson Crown Esports</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- Header with Navbar -->
  <header>
    <img src="assets/images/logo.png" alt="Crimson Crown Logo" class="logo">
    <nav class="navbar">
      <div class="menu-toggle">&#9776;</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="tournaments.html">Tournaments</a></li>
        <li><a href="leaderboard.html" class="active">Leaderboard</a></li>
        <li><a href="registration.html">Registration</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Leaderboard Section -->
  <section class="leaderboard">
    <h1>LEADERBOARD</h1>

    <!-- Podium Top 3 -->
<div class="top-three">
  <div class="rank rank-2">
    <h2>#2</h2>
    <img id="logo-2" src="" alt="Team 2 Logo" class="team-logo">
    <p id="team-2">TEAM 2</p>
    <span id="points-2">0 pts</span>
  </div>
  <div class="rank rank-1">
    <h2>#1</h2>
    <img id="logo-1" src="" alt="Team 1 Logo" class="team-logo">
    <p id="team-1">TEAM 1</p>
    <span id="points-1">0 pts</span>
  </div>
  <div class="rank rank-3">
    <h2>#3</h2>
    <img id="logo-3" src="" alt="Team 3 Logo" class="team-logo">
    <p id="team-3">TEAM 3</p>
    <span id="points-3">0 pts</span>
  </div>
</div>
    <!-- End Podium Top 3 -->

    <!-- Table 4th onwards -->
    <table class="leaderboard-table">
      <thead>
        <tr>
          <th>RANK</th>
          <th>TEAM NAME</th>
          <th>POINTS</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body">
        <!-- Dynamic rows from JS -->
      </tbody>
    </table>
  </section>

  <footer>
    <p>© 2025 Crimson Crown Esports. All rights reserved.</p>
  </footer>

  <!-- JS -->
  <script src="assets/js/leaderboard.js"></script>
</body>
</html>
