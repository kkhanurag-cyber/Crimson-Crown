<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration — Crimson Crown Esports</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <!-- Header with Navbar -->
<header>
  <img src="assets/images/logo.png" alt="Crimson Crown Logo" class="logo">
  <nav class="navbar">
    <div class="menu-toggle">&#9776;</div>
    <ul class="nav-links">
        <li><a href="index.html" >Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="tournaments.html">Tournaments</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
        <li><a href="registration.html" class="active">Registration</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

<section class="page-header">
    <h1>Team Registration</h1>
    <p id="tournamentInfo">Loading tournament details...</p>
  </section>

  <section class="content">
    <div id="invalidAccess" style="display:none; color:red; font-weight:bold;">
      ⚠️ Invalid access. Please register through the Tournaments page.
    </div>

    <form id="registrationForm" style="display:none;">
      <input type="hidden" name="scrimId" id="scrimId">

      <label>Team Name</label>
      <input type="text" name="teamName" required>

      <label>Captain</label>
      <input type="text" name="captain" required>

      <label>Player 1</label>
      <input type="text" name="player1" required>
      <label>Player 2</label>
      <input type="text" name="player2" required>
      <label>Player 3</label>
      <input type="text" name="player3" required>
      <label>Player 4</label>
      <input type="text" name="player4" required>

      <label>Substitute 1</label>
      <input type="text" name="sub1">
      <label>Substitute 2</label>
      <input type="text" name="sub2">
      <label>Substitute 3</label>
      <input type="text" name="sub3">

      <label>Team Logo (URL)</label>
      <input type="url" name="teamLogo" placeholder="https://example.com/logo.png">

      <button type="submit">Submit Registration</button>
    </form>

    <p id="message"></p>
  </section>

  <footer>
    <p>© 2025 Crimson Crown Esports</p>
  </footer>

  <script src="assets/js/registration.js"></script>
</body>
</html>
