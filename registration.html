<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration | Crimson Crown</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header>
    <!--<img src="assets/images/logo.png" alt="Crimson Crown Logo" class="logo" /> -->
  <!-- Navbar Placeholder -->
  <div id="navbar"></div>
  </header>

  <section class="page-header">
    <h1>Team Registration</h1>
    <p>Register your team for upcoming tournaments</p>
  </section>

  <section class="content">
    <form action="#" method="POST" class="registration-form">
      <input type="text" name="team_name" placeholder="Team Name" required />
      <input type="text" name="team_leader" placeholder="Team Leader Name" required />
      <input type="email" name="email" placeholder="Team Leader Email" required />
      <textarea name="players" placeholder="List of Players (IGNs, Discord IDs)" required></textarea>
      <button type="submit" class="btn">Register</button>
    </form>
  </section>

  <!-- Footer Placeholder -->
  <div id="footer"></div>

  <script src="assets/js/main.js"></script>
</body>
</html>
