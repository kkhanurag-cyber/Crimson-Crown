<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration — Crimson Crown Esports</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- Header with Navbar -->
  <header>
    <img src="assets/images/logo.png" alt="Crimson Crown Logo" class="logo" />
    <nav class="navbar">
      <ul class="nav-links">
        <li><a href="index.html" >Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="tournaments.html">Tournaments</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
        <li><a href="registration.html" class="active">Registration</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="page-header">
    <h1>Register Your Team</h1>
    <p>Sign up to participate in upcoming tournaments.</p>
  </section>

  <section class="content">
    <form class="form">
      <label for="team-name">Team Name:</label>
      <input type="text" id="team-name" name="team-name" required />

      <label for="captain">Captain Name:</label>
      <input type="text" id="captain" name="captain" required />

      <label for="email">Captain Email:</label>
      <input type="email" id="email" name="email" required />

      <label for="members">Team Members (IGNs):</label>
      <textarea id="members" name="members" rows="4" required></textarea>

      <button type="submit" class="btn">Submit Registration</button>
    </form>
  </section>

  <footer>
    <p>© 2025 Crimson Crown Esports. All rights reserved.</p>
  </footer>
</body>
</html>
