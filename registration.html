<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Crimson Crown</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="assets/js/include.js" defer></script>
</head>
<body>
  <header>
    <img src="assets/images/logo.png" alt="Crimson Crown Logo" class="logo" />
    <div data-include="includes/navbar.html"></div>
  </header>

  <section class="page-header">
    <h1>Register Your Team</h1>
    <p>Join upcoming Crimson Crown tournaments</p>
  </section>

  <div class="content">
    <form class="registration-form">
      <input type="text" placeholder="Team Name" required />
      <input type="text" placeholder="Leader Name" required />
      <input type="email" placeholder="Email" required />
      <select required>
        <option value="">Select Game</option>
        <option value="pubg">PUBG Mobile</option>
        <option value="bgmi">BGMI</option>
        <option value="codm">COD Mobile</option>
      </select>
      <button type="submit" class="btn">Submit</button>
    </form>
  </div>

  <div data-include="includes/footer.html"></div>
</body>
</html>
