<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration — Crimson Crown Esports</title>
   <style>
    /* Page Layout Fix */
html, body {
  height: 100%;
  margin: 0;
  display: flex;
  flex-direction: column;
}

.content {
  flex: 1; /* pushes footer down */
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
}

/* Form Styling */
.form-box {
  background: #111;
  padding: 25px;
  border-radius: 10px;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 0 15px rgba(255,0,0,0.3);
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.form-box label {
  font-weight: 600;
  margin-bottom: 5px;
  color: #fff;
}

.form-box input,
.form-box textarea,
.form-box select {
  padding: 10px;
  border-radius: 6px;
  border: none;
  outline: none;
  font-size: 14px;
  width: 100%;
}

.form-box textarea {
  resize: vertical;
  min-height: 80px;
}

.form-box button {
  background: crimson;
  color: #fff;
  font-weight: bold;
  padding: 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.form-box button:hover {
  background: #e60026;
  box-shadow: 0 0 10px crimson;
}

/* Footer Stick */
footer {
  background: #000;
  color: #aaa;
  text-align: center;
  padding: 15px 0;
  margin-top: auto;
}

   </style>
</head>
<body>
  <!-- Header with Navbar -->
  <header>
    <img src="assets/images/logo.png" alt="Crimson Crown Logo" class="logo" />
    <nav class="navbar">
      <ul class="nav-links">
        <li><a href="index.html" >Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="tournaments.html">Tournaments</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
        <li><a href="registration.html" class="active">Registration</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

<section class="page-header">
  <h1>Register Your Team</h1>
  <p>Sign up to participate in upcoming tournaments.</p>
</section>

<section class="content">
  <form class="form-box">
    <label>Team Name</label>
    <input type="text" placeholder="Enter Team Name" required />

    <label>Captain Name</label>
    <input type="text" placeholder="Enter Captain Name" required />

    <label>Captain Email</label>
    <input type="email" placeholder="Enter Captain Email" required />

    <label>Members (IGNs)</label>
    <textarea placeholder="List player names (one per line)" required></textarea>

    <label>Game</label>
    <select required>
      <option value="farlight84">Farlight 84</option>
    </select>

    <button type="submit" class="btn">Submit Registration</button>
  </form>
</section>


  <footer>
    <p>© 2025 Crimson Crown Esports. All rights reserved.</p>
  </footer>
</body>
</html>
